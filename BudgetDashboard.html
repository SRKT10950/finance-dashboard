<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Tracker</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --secondary: #f87171;
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-blue: #60a5fa;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #09090b 40%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .top-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .top-nav a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .top-nav a.active {
            background: rgba(96, 165, 250, 0.15);
            color: var(--accent-blue);
        }

        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
        }

        select.editable {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        
        select.editable option {
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .dataTable {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 0.8rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 0.8rem 0.6rem;
            border-bottom: 1px solid var(--border-color);
            color: #d4d4d8;
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }

        .num { text-align: right; font-variant-numeric: tabular-nums; }
        
        .editable {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: inherit;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.4rem;
            border-radius: 6px;
            font-weight: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
        }
        
        .editable:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2);
        }

        .btn-add {
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-add:hover {
            background: var(--accent-blue);
            color: #fff;
        }

        .badge-positive { color: var(--primary); font-weight: 600; }
        .badge-negative { color: var(--secondary); font-weight: 600; }
        
    </style>
</head>
<body>

<div class="dashboard">
    <div class="top-nav">
        <a href="FinancialDashboard.html">Overview</a>
        <a href="BudgetDashboard.html" class="active">Budget</a>
        <a href="LoanDashboard.html">Loans</a>
        <a href="InvestmentDashboard.html">Investments</a>
        <a href="LenderDashboard.html">Lend & Borrow</a>
        <a href="RepaymentDashboard.html">Repayments</a>
    </div>

    <div class="header">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; width: 100%;">
        <div>
            <h1>Budget Tracker</h1>
            <div class="filters" style="margin-top: 1rem;">
                <select id="filterMonth" class="editable" style="width: auto; padding: 0.5rem 1rem;">
                    <option value="Jan">Jan</option>
                    <option value="Feb">Feb</option>
                    <option value="Mar">Mar</option>
                    <option value="Apr">Apr</option>
                    <option value="May">May</option>
                    <option value="Jun">Jun</option>
                    <option value="Jul">Jul</option>
                    <option value="Aug">Aug</option>
                    <option value="Sep">Sep</option>
                    <option value="Oct">Oct</option>
                    <option value="Nov">Nov</option>
                    <option value="Dec">Dec</option>
                </select>
                <input type="number" id="filterYear" class="editable" style="width: 100px; padding: 0.5rem 1rem;">
            </div>
        </div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <div style="background: rgba(24, 24, 27, 0.65); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 1rem 1.5rem; text-align: right;">
                <div style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.25rem;">Total Planned</div>
                <div id="sum-planned" style="font-size: 1.5rem; font-weight: 700; color: var(--accent-blue);">₹0</div>
            </div>
            <div style="background: rgba(24, 24, 27, 0.65); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 1rem 1.5rem; text-align: right;">
                <div style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.25rem;">Total Actual</div>
                <div id="sum-actual" style="font-size: 1.5rem; font-weight: 700; color: var(--primary);">₹0</div>
            </div>
            <div style="background: rgba(24, 24, 27, 0.65); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 1rem 1.5rem; text-align: right;">
                <div style="font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.25rem;">Allocated Maint. (Overview)</div>
                <div id="sum-maintenance-alloc" style="font-size: 1.5rem; font-weight: 700; color: #c084fc;">₹0</div>
            </div>
        </div>
      </div>
    </div>

    <div class="dataTable">
        <table id="budgetTable">
            <thead>
                <tr>
                    <th>Category</th>
                    <th class="num">Planned</th>
                    <th class="num">Actual</th>
                    <th class="num">Variance</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="budgetBody">
                <!-- Data goes here -->
            </tbody>
        </table>
    </div>

    <div style="display: flex; gap: 1rem; align-items: flex-start; margin-top: 0.5rem;">
        <button class="btn-add" id="addRowBtn">+ Add Row</button>
        <button class="btn-add" id="saveJsonBtn" style="background: rgba(74, 222, 128, 0.15); border-color: var(--primary); color: var(--primary);">Save Data context as JSON</button>
        <label class="btn-add" style="background: rgba(161, 161, 170, 0.15); border-color: var(--text-muted); color: var(--text-main); cursor: pointer;">
            Load JSON Data
            <input type="file" id="loadJsonInput" accept=".json" style="display: none;">
        </label>
    </div>
</div>

<script>
    const fmt = n => Number(Math.round(n)).toLocaleString('en-IN');
    const tbody = document.getElementById('budgetBody');
    
    // Core Application State
    let budgetData = [];
    
    const defaultCategories = [
        "Salary", "Groceries", "Utilities", "Transport", "Medical", 
        "Childcare", "Education", "Dining Out", "Entertainment", "Insurance", 
        "Investments", "Donations", "House Maintenance", "Mobile/Wifi", 
        "Gas", "Electricity", "Helper", "Other"
    ];

    // Filter Initialization
    const now = new Date();
    const currentYear = now.getFullYear();
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    document.getElementById('filterYear').value = currentYear;
    document.getElementById('filterMonth').value = months[now.getMonth()];

    const getFilters = () => ({
        year: Number(document.getElementById('filterYear').value) || currentYear,
        month: document.getElementById('filterMonth').value
    });

    const updateBudgetSummary = () => {
        let totalPlanned = 0;
        let totalActual = 0;

        const { year, month } = getFilters();
        const monthData = budgetData.filter(d => Number(d.year) === year && d.month === month);

        monthData.forEach(item => {
            totalPlanned += Number(item.planned) || 0;
            totalActual += Number(item.actual) || 0;
        });

        const domPlan = document.getElementById('sum-planned');
        const domAct = document.getElementById('sum-actual');
        
        if (domPlan) domPlan.innerText = `₹${fmt(totalPlanned)}`;
        if (domAct) domAct.innerText = `₹${fmt(totalActual)}`;

        const domMaint = document.getElementById('sum-maintenance-alloc');
        if (domMaint) {
            const inc = Number(localStorage.getItem("overviewIncome")) || 0;
            const maintAlloc = Math.round(inc * 0.24); // Dynamically locked matching Overview constraint mapping natively
            domMaint.innerText = `₹${fmt(maintAlloc)}`;
        }
    };

    const saveToLocalStorage = () => {
        localStorage.setItem('budgetData', JSON.stringify(budgetData));
        updateBudgetSummary();
    };

    const recalcRow = (tr, item) => {
        const v = item.planned - item.actual;
        const outVar = tr.querySelector('.out-var');
        outVar.innerText = fmt(v);
        
        if (v > 0) outVar.className = 'num out-var badge-positive';
        else if (v < 0) outVar.className = 'num out-var badge-negative';
        else outVar.className = 'num out-var';
    };

    const appendRowDOM = (item) => {
        const tr = document.createElement('tr');
        
        // Use empty string to avoid rendering '0' explicitly
        const pText = item.planned !== 0 ? item.planned : '';
        const aText = item.actual !== 0 ? item.actual : '';

        tr.innerHTML = `
            <td><input type="text" class="editable in-cat" value="${item.category}" placeholder="Category" style="width: 250px"></td>
            <td class="num"><input type="number" class="editable num in-plan" value="${pText}" style="width: 140px"></td>
            <td class="num"><input type="number" class="editable num in-act" value="${aText}" style="width: 140px"></td>
            <td class="num out-var">-</td>
            <td><button style="background:transparent; border:none; color:var(--secondary); font-weight:bold; font-size:1rem; cursor:pointer; padding:0 0.5rem;" title="Remove row">×</button></td>
        `;

        const btnDel = tr.querySelector('button');
        btnDel.addEventListener('click', () => {
            budgetData = budgetData.filter(d => d !== item);
            tr.remove();
            saveToLocalStorage();
        });

        const inputs = tr.querySelectorAll('.editable');
        inputs.forEach(i => i.addEventListener('input', () => {
            item.category = tr.querySelector('.in-cat').value;
            item.planned = Number(tr.querySelector('.in-plan').value) || 0;
            item.actual = Number(tr.querySelector('.in-act').value) || 0;
            recalcRow(tr, item);
            saveToLocalStorage();
        }));

        tbody.appendChild(tr);
        recalcRow(tr, item);
    };

    const renderTable = () => {
        tbody.innerHTML = '';
        const { year, month } = getFilters();

        let monthData = budgetData.filter(d => Number(d.year) === year && d.month === month);
        
        // If there's absolutely no data for this month-year cross section, generate the template defaults
        if (monthData.length === 0) {
            defaultCategories.forEach(cat => {
                // If it's literally the first launch ever for current Month/Year
                const isSalInit = (cat === "Salary" && budgetData.length === 0);
                const item = { 
                    year: year, 
                    month: month, 
                    category: cat, 
                    planned: isSalInit ? 60000 : 0, 
                    actual: isSalInit ? 50000 : 0 
                };
                budgetData.push(item);
                monthData.push(item);
            });
            saveToLocalStorage();
        }

        monthData.forEach(item => appendRowDOM(item));
        updateBudgetSummary();
    };

    const initData = () => {
        try {
            const savedData = localStorage.getItem('budgetData');
            if (savedData) {
                const data = JSON.parse(savedData);
                if (Array.isArray(data)) {
                    budgetData = data;
                }
            }
        } catch (err) {
            console.error(err);
        }
        renderTable();
    };

    // Filter event listeners to re-render
    document.getElementById('filterMonth').addEventListener('change', renderTable);
    document.getElementById('filterYear').addEventListener('input', renderTable);

    document.getElementById('addRowBtn').addEventListener('click', () => {
        const { year, month } = getFilters();
        const newItem = { year, month, category: '', planned: 0, actual: 0 };
        budgetData.push(newItem);
        appendRowDOM(newItem);
        saveToLocalStorage();
    });

    // File Management
    document.getElementById('saveJsonBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(budgetData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "budget_archive.json";
        a.click();
        URL.revokeObjectURL(url);
    });

    document.getElementById('loadJsonInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (Array.isArray(data)) {
                    budgetData = data;
                    saveToLocalStorage();
                    renderTable();
                } else alert("Invalid JSON format.");
            } catch (err) {
                alert("Error importing document.");
            }
        };
        e.target.value = ''; 
        reader.readAsText(file);
    });

    initData();

</script>
</body>
</html>
