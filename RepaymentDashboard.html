<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Repayment</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finance" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #4ade80;
        --secondary: #f87171;
        --bg-dark: #09090b;
        --card-bg: rgba(24, 24, 27, 0.65);
        --border-color: rgba(255, 255, 255, 0.1);
        --text-main: #f4f4f5;
        --text-muted: #a1a1aa;
        --repay-theme: #2dd4bf; /* Teal theme for repayment */
      }

      body {
        font-family: "Outfit", sans-serif;
        background: radial-gradient(circle at top left, #1e1b4b, #09090b 40%);
        color: var(--text-main);
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
        display: flex;
        justify-content: center;
      }

      .dashboard {
        width: 100%;
        max-width: 1000px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .top-nav {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1rem;
        flex-wrap: wrap;
      }

      .top-nav a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        transition: all 0.2s;
      }

      .top-nav a:hover {
        color: var(--text-main);
        background: rgba(255, 255, 255, 0.05);
      }

      .top-nav a.active {
        background: rgba(45, 212, 191, 0.15); /* matching --repay-theme */
        color: var(--repay-theme);
      }

      .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(to right, #60a5fa, #2dd4bf);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .dataTable {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th {
        padding: 1rem 0.8rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-color);
        background: rgba(255, 255, 255, 0.02);
        font-weight: 600;
        white-space: nowrap;
      }

      td {
        padding: 0.8rem 0.6rem;
        border-bottom: 1px solid var(--border-color);
        color: #d4d4d8;
        font-size: 0.95rem;
      }

      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.03);
      }

      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .editable {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: inherit;
        font-family: inherit;
        font-size: 0.95rem;
        padding: 0.4rem;
        border-radius: 6px;
        font-weight: inherit;
        transition: all 0.2s;
        box-sizing: border-box;
        width: 100%;
      }

      .editable:focus {
        outline: none;
        border-color: var(--repay-theme);
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
      }

      .editable option {
        background: #09090b;
        color: #f4f4f5;
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        opacity: 0.6;
        cursor: pointer;
      }

      .btn-add {
        background: rgba(45, 212, 191, 0.15);
        border: 1px solid var(--repay-theme);
        color: var(--repay-theme);
        padding: 0.7rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s;
      }

      .btn-add:hover {
        background: var(--repay-theme);
        color: #111;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="top-nav">
        <a href="index.html">Overview</a>
        <a href="BudgetDashboard.html">Budget</a>
        <a href="LoanDashboard.html">Loans</a>
        <a href="InvestmentDashboard.html">Investments</a>
        <a href="LenderDashboard.html">Lend & Borrow</a>
        <a href="RepaymentDashboard.html" class="active">Repayments</a>
      </div>

      <div class="header">
        <h1>Repayment</h1>
      </div>

      <div class="dataTable">
        <table id="repayTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Payment</th>
              <th class="num">Paid Amount (₹)</th>
              <th>Comment</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="repayBody">
            <!-- Data goes here -->
          </tbody>
        </table>
      </div>

      <div style="display: flex; gap: 1rem; align-items: flex-start; margin-top: 0.5rem">
        <button class="btn-add" id="addRowBtn">+ Add Row</button>
        <button class="btn-add" id="saveJsonBtn" style="background: rgba(74, 222, 128, 0.15); border-color: var(--primary); color: var(--primary)">Save Data as JSON</button>
        <label class="btn-add" style="background: rgba(161, 161, 170, 0.15); border-color: var(--text-muted); color: var(--text-main); cursor: pointer">
          Load JSON Form
          <input type="file" id="loadJsonInput" accept=".json" style="display: none" />
        </label>
      </div>
    </div>

    <script>
      const fmt = (n) => Number(Math.round(n)).toLocaleString("en-IN");
      const tbody = document.getElementById("repayBody");

      const saveToLocalStorage = () => {
        const rows = [];
        document.querySelectorAll("#repayBody tr").forEach((tr) => {
          const lenderSelect = tr.querySelector(".in-lender");
          const lenderId = lenderSelect.value;
          const selectedOpt = lenderSelect.options[lenderSelect.selectedIndex];
          const lenderName = selectedOpt ? selectedOpt.text.split(" (₹")[0] : lenderId;
          const pmDate = tr.querySelector(".in-date").value;
          const paid = Number(tr.querySelector(".in-paid").value) || 0;
          const comment = tr.querySelector(".in-comment").value;

          if (lenderId || pmDate || paid || comment) {
            rows.push({ lenderId, lender: lenderName, pmDate, paid, comment });
          }
        });
        localStorage.setItem("repayData", JSON.stringify(rows));
      };

      const getLenders = () => {
        let lenders = [];
        try {
          const saved = localStorage.getItem("lenderData");
          if (saved) {
            const data = JSON.parse(saved);
            data.forEach((item) => {
              if (item.lender && item.status === "Active") {
                lenders.push({ id: item.id || item.lender, label: `${item.lender} (₹${fmt(item.principal || 0)})` });
              }
            });
          }
        } catch (err) {}
        return lenders;
      };

      const addRow = (data = null, skipSave = false) => {
        const tr = document.createElement("tr");

        const d_lenderId = data && data.lenderId ? data.lenderId : data && data.lender ? data.lender : "";
        const d_lenderName = data && data.lender ? data.lender : "";
        const d_date = data && data.pmDate ? data.pmDate : "";
        const d_paid = data && data.paid !== undefined ? data.paid : "";
        const d_comment = data && data.comment ? data.comment : "";

        const availableLenders = getLenders();
        if (d_lenderId && !availableLenders.some((l) => l.id === d_lenderId)) {
          availableLenders.unshift({ id: d_lenderId, label: d_lenderName || d_lenderId });
        }
        let opts = availableLenders.map((l) => `<option value="${l.id}" ${l.id === d_lenderId ? "selected" : ""}>${l.label || l.id}</option>`).join("");
        if (!d_lenderId) opts = `<option value="" selected disabled>Select Name</option>` + opts;

        tr.innerHTML = `
            <td>
                <select class="editable in-lender" style="width: 200px">
                    ${opts}
                </select>
            </td>
            <td><input type="date" class="editable in-date" value="${d_date}"></td>
            <td class="num"><input type="number" class="editable num in-paid" value="${d_paid}" style="width: 150px"></td>
            <td><input type="text" class="editable in-comment" value="${d_comment}" placeholder="Comment" style="width: 300px"></td>
            <td><button style="background:transparent; border:none; color:var(--secondary); font-weight:bold; font-size:1.2rem; cursor:pointer; padding:0 0.5rem;" title="Remove row">×</button></td>
        `;

        const btnDel = tr.querySelector("button");
        btnDel.addEventListener("click", () => {
          tr.remove();
          saveToLocalStorage();
        });

        const inputs = tr.querySelectorAll(".editable");
        inputs.forEach((i) =>
          i.addEventListener("input", () => {
            saveToLocalStorage();
          })
        );

        tbody.appendChild(tr);
        if (!skipSave) {
          saveToLocalStorage();
        }
      };

      const initData = () => {
        try {
          const savedData = localStorage.getItem("repayData");
          if (savedData) {
            const data = JSON.parse(savedData);
            if (Array.isArray(data) && data.length > 0) {
              data.forEach((item) => addRow(item, true));
              return;
            }
          }
        } catch (err) {
          console.error(err);
        }

        // Add one default matching image
        addRow(
          {
            lender: "",
            pmDate: "",
            paid: 0,
            comment: ""
          },
          true
        );
      };

      initData();

      document.getElementById("addRowBtn").addEventListener("click", () => addRow(null));

      // Export JSON
      document.getElementById("saveJsonBtn").addEventListener("click", () => {
        const rows = [];
        document.querySelectorAll("#repayBody tr").forEach((tr) => {
          const lenderSelect = tr.querySelector(".in-lender");
          const lenderId = lenderSelect.value;
          const selectedOpt = lenderSelect.options[lenderSelect.selectedIndex];
          const lenderName = selectedOpt ? selectedOpt.text.split(" (₹")[0] : lenderId;
          const pmDate = tr.querySelector(".in-date").value;
          const paid = Number(tr.querySelector(".in-paid").value) || 0;
          const comment = tr.querySelector(".in-comment").value;

          if (lenderId || pmDate || paid || comment) {
            rows.push({ lenderId, lender: lenderName, pmDate, paid, comment });
          }
        });
        const blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "repayment_archive.json";
        a.click();
        URL.revokeObjectURL(url);
      });

      // Import JSON
      document.getElementById("loadJsonInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (Array.isArray(data)) {
              tbody.innerHTML = "";
              data.forEach((item) => addRow(item, true));
              saveToLocalStorage();
            } else alert("Invalid JSON format.");
          } catch (err) {
            alert("Error importing document.");
          }
        };
        e.target.value = "";
        reader.readAsText(file);
      });
    </script>
  </body>
</html>
