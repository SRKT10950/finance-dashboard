<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lend & Borrow</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finance">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --secondary: #f87171;
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-blue: #60a5fa;
            --lender-theme: #f59e0b; /* Amber theme for lenders */
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #09090b 40%);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px; /* Wider for all the columns */
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .top-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .top-nav a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .top-nav a.active {
            background: rgba(245, 158, 11, 0.15); /* matching --lender-theme */
            color: var(--lender-theme);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #fcd34d);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dataTable {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 0.8rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 0.8rem 0.6rem;
            border-bottom: 1px solid var(--border-color);
            color: #d4d4d8;
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.03); }

        .num { text-align: right; font-variant-numeric: tabular-nums; }
        
        .editable {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: inherit;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 0.4rem;
            border-radius: 6px;
            font-weight: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
        }
        
        .editable:focus {
            outline: none;
            border-color: var(--lender-theme);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        .editable option {
            background: #09090b;
            color: #f4f4f5;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }

        .btn-add {
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid var(--lender-theme);
            color: var(--lender-theme);
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-add:hover {
            background: var(--lender-theme);
            color: #111; /* Dark text for bright button hover */
        }
        
    </style>
</head>
<body>

<div class="dashboard">
    <div class="top-nav">
       <!-- <a href="FinancialDashboard.html">Overview</a> -->
        <a href="index.html">Overview</a>
        <a href="BudgetDashboard.html">Budget</a>
        <a href="LoanDashboard.html">Loans</a>
        <a href="InvestmentDashboard.html">Investments</a>
        <a href="LenderDashboard.html" class="active">Lend & Borrow</a>
        <a href="RepaymentDashboard.html">Repayments</a>
    </div>

    <div class="header">
        <h1>Lend & Borrow</h1>
    </div>

    <div class="summary-cards" style="display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
        <div class="card" style="background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); padding: 1.2rem 1.5rem; border-radius: 12px; flex: 1; min-width: 200px;">
            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.3rem;">Active Borrowers (To Receive)</div>
            <div id="sum-borrowers" style="font-size: 2rem; font-weight: 700; color: var(--primary);">₹0</div>
        </div>
        <div class="card" style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); padding: 1.2rem 1.5rem; border-radius: 12px; flex: 1; min-width: 200px;">
            <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.3rem;">Active Lenders (To Pay)</div>
            <div id="sum-lenders" style="font-size: 2rem; font-weight: 700; color: var(--secondary);">₹0</div>
        </div>
    </div>

    <div class="dataTable">
        <table id="lenderTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Return Date</th>
                    <th class="num">Tenure (M)</th>
                    <th class="num">Principal (₹)</th>
                    <th class="num">Settled (₹)</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="lenderBody">
                <!-- Data goes here -->
            </tbody>
        </table>
    </div>

    <div style="display: flex; gap: 1rem; align-items: flex-start; margin-top: 0.5rem;">
        <button class="btn-add" id="addRowBtn">+ Add Row</button>
        <button class="btn-add" id="saveJsonBtn" style="background: rgba(74, 222, 128, 0.15); border-color: var(--primary); color: var(--primary);">Save Data as JSON</button>
        <label class="btn-add" style="background: rgba(161, 161, 170, 0.15); border-color: var(--text-muted); color: var(--text-main); cursor: pointer;">
            Load JSON Form
            <input type="file" id="loadJsonInput" accept=".json" style="display: none;">
        </label>
    </div>
</div>

<script>
    const fmt = n => Number(Math.round(n)).toLocaleString('en-IN');
    const tbody = document.getElementById('lenderBody');

    const updateSummary = () => {
        let sumBorrowers = 0;
        let sumLenders = 0;
        document.querySelectorAll('#lenderBody tr').forEach(tr => {
            const status = tr.querySelector('.out-status').innerText;
            if (status === 'Active') {
                const type = tr.querySelector('.in-type').value;
                const principal = Number(tr.querySelector('.in-prin').value) || 0;
                const paid = Number(tr.querySelector('.out-paid').dataset.val) || 0;
                const pending = principal - paid;
                if (pending > 0) {
                    if (type === 'Borrower') sumBorrowers += pending;
                    else sumLenders += pending;
                }
            }
        });
        const domBorrowers = document.getElementById('sum-borrowers');
        if (domBorrowers) domBorrowers.innerText = `₹${fmt(sumBorrowers)}`;
        const domLenders = document.getElementById('sum-lenders');
        if (domLenders) domLenders.innerText = `₹${fmt(sumLenders)}`;
    };

    const saveToLocalStorage = () => {
        const rows = [];
        document.querySelectorAll('#lenderBody tr').forEach(tr => {
            const id = tr.dataset.id;
            const lender = tr.querySelector('.in-lender').value;
            const type = tr.querySelector('.in-type').value;
            const status = tr.querySelector('.out-status').innerText;
            const dateStr = tr.querySelector('.in-date').value;
            const returnDateStr = tr.querySelector('.out-return-date').dataset.val || '';
            const tenure = Number(tr.querySelector('.out-tenure').dataset.val) || 0;
            const principal = Number(tr.querySelector('.in-prin').value) || 0;
            const paid = Number(tr.querySelector('.out-paid').dataset.val) || 0;
            
            if (lender || dateStr || returnDateStr || principal || paid) {
                rows.push({ id, lender, type, status, date: dateStr, returnDate: returnDateStr, tenure, principal, paid });
            }
        });
        localStorage.setItem('lenderData', JSON.stringify(rows));
    };

    const getRepaymentStats = (personId, personName) => {
        let stats = { totalPaid: 0, lastDate: '' };
        if (!personId && !personName) return stats;
        try {
            const saved = localStorage.getItem('repayData');
            if (saved) {
                const data = JSON.parse(saved);
                let maxDate = 0;
                data.forEach(item => {
                    if (item.lenderId === personId || item.lenderId === personName || (!item.lenderId && item.lender === personName)) {
                        stats.totalPaid += Number(item.paid) || 0;
                        if (item.pmDate) {
                            const pmTime = new Date(item.pmDate).getTime();
                            if (pmTime > maxDate) {
                                maxDate = pmTime;
                                stats.lastDate = item.pmDate;
                            }
                        }
                    }
                });
            }
        } catch(e) {}
        return stats;
    };

    const recalcRow = (tr) => {
        const lenderId = tr.dataset.id;
        const lenderNode = tr.querySelector('.in-lender');
        const lenderName = lenderNode ? lenderNode.value.trim() : '';
        const dateStr = tr.querySelector('.in-date').value;
        const principal = Number(tr.querySelector('.in-prin').value) || 0;
        
        const stats = getRepaymentStats(lenderId, lenderName);
        const paid = stats.totalPaid;
        const returnDateStr = stats.lastDate;

        const outReturnDate = tr.querySelector('.out-return-date');
        if (outReturnDate) {
            outReturnDate.dataset.val = returnDateStr;
            outReturnDate.innerText = returnDateStr ? returnDateStr.split('-').reverse().join('-') : '-';
        }

        const outPaid = tr.querySelector('.out-paid');
        if (outPaid) {
            outPaid.dataset.val = paid;
            outPaid.innerText = fmt(paid);
        }
        
        const outTenure = tr.querySelector('.out-tenure');
        const outStatus = tr.querySelector('.out-status');

        // Tenure logic
        if (dateStr && returnDateStr) {
            const start = new Date(dateStr);
            const ret = new Date(returnDateStr);
            let monthsDiff = (ret.getFullYear() - start.getFullYear()) * 12 + (ret.getMonth() - start.getMonth());
            if (ret.getDate() < start.getDate()) {
                monthsDiff--;
            }
            if (monthsDiff < 0) monthsDiff = 0;
            outTenure.innerText = monthsDiff;
            outTenure.dataset.val = monthsDiff;
        } else {
            outTenure.innerText = '-';
            outTenure.dataset.val = 0;
        }

        // Status logic
        if (principal > 0) {
            if (paid >= principal) {
                outStatus.innerText = 'Closed';
                outStatus.style.color = 'var(--primary)';
            } else {
                outStatus.innerText = 'Active';
                outStatus.style.color = '#fbbf24'; // Amber accent for active lenders
            }
        } else {
            outStatus.innerText = '-';
            outStatus.style.color = 'inherit';
        }
    };

    const addRow = (data = null, skipSave = false) => {
        const tr = document.createElement('tr');
        
        const d_id = data && data.id ? data.id : (Date.now().toString(36) + Math.random().toString(36).substr(2, 5));
        tr.dataset.id = d_id;
        
        const d_lender = data && data.lender ? data.lender : '';
        const d_type = data && data.type ? data.type : 'Lender';
        const d_date = data && data.date ? data.date : '';
        
        const d_prin = data && data.principal !== undefined ? data.principal : '';
        const stats = getRepaymentStats(d_id, d_lender);
        const d_paid = stats.totalPaid;
        const d_returnDate = stats.lastDate || (data && data.returnDate ? data.returnDate : '');

        tr.innerHTML = `
            <td><input type="text" class="editable in-lender" value="${d_lender}" placeholder="Name" style="width: 140px"></td>
            <td>
                <select class="editable in-type" style="width: 100px;">
                    <option value="Lender" ${d_type === 'Lender' ? 'selected' : ''}>Lender</option>
                    <option value="Borrower" ${d_type === 'Borrower' ? 'selected' : ''}>Borrower</option>
                </select>
            </td>
            <td class="out-status" style="font-weight: 600;">-</td>
            <td><input type="date" class="editable in-date" value="${d_date}"></td>
            <td class="out-return-date" data-val="${d_returnDate}" style="font-weight: 500;">${d_returnDate ? d_returnDate.split('-').reverse().join('-') : '-'}</td>
            <td class="num out-tenure" data-val="0" style="font-weight: 500;">-</td>
            <td class="num"><input type="number" class="editable num in-prin" value="${d_prin}" style="width: 130px"></td>
            <td class="num out-paid" data-val="${d_paid}" style="font-weight: 500;">${fmt(d_paid)}</td>
            <td><button style="background:transparent; border:none; color:var(--secondary); font-weight:bold; font-size:1.2rem; cursor:pointer; padding:0 0.5rem;" title="Remove row">×</button></td>
        `;

        const btnDel = tr.querySelector('button');
        btnDel.addEventListener('click', () => {
            tr.remove();
            updateSummary();
            saveToLocalStorage();
        });

        const inputs = tr.querySelectorAll('.editable');
        inputs.forEach(i => i.addEventListener('input', () => {
            recalcRow(tr);
            updateSummary();
            saveToLocalStorage();
        }));

        tbody.appendChild(tr);
        recalcRow(tr); 
        updateSummary();
        
        if (!skipSave) {
            saveToLocalStorage();
        }
    };

    const initData = () => {
        try {
            const savedData = localStorage.getItem('lenderData');
            if (savedData) {
                const data = JSON.parse(savedData);
                if (Array.isArray(data) && data.length > 0) {
                    data.forEach(item => addRow(item, true));
                    return;
                }
            }
        } catch (err) {
            console.error(err);
        }
        
        // Add one default matching image
        addRow({
            lender: "Abhishek Singh",
            type: "Lender",
            date: "2026-03-19",
            tenure: 60,
            principal: 60000,
            paid: 0
        }, true);
    };

    initData();

    window.addEventListener('focus', () => {
        document.querySelectorAll('#lenderBody tr').forEach(tr => recalcRow(tr));
        updateSummary();
        saveToLocalStorage();
    });

    document.getElementById('addRowBtn').addEventListener('click', () => addRow(null));

    // Export JSON
    document.getElementById('saveJsonBtn').addEventListener('click', () => {
        const rows = [];
        document.querySelectorAll('#lenderBody tr').forEach(tr => {
            const id = tr.dataset.id;
            const lender = tr.querySelector('.in-lender').value;
            const type = tr.querySelector('.in-type').value;
            const status = tr.querySelector('.out-status').innerText;
            const dateStr = tr.querySelector('.in-date').value;
            const returnDateStr = tr.querySelector('.out-return-date').dataset.val || '';
            const tenure = Number(tr.querySelector('.out-tenure').dataset.val) || 0;
            const principal = Number(tr.querySelector('.in-prin').value) || 0;
            const paid = Number(tr.querySelector('.out-paid').dataset.val) || 0;
            
            if (lender || dateStr || returnDateStr || principal || paid) {
                rows.push({ id, lender, type, status, date: dateStr, returnDate: returnDateStr, tenure, principal, paid });
            }
        });
        const blob = new Blob([JSON.stringify(rows, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "lenders_archive.json";
        a.click();
        URL.revokeObjectURL(url);
    });

    // Import JSON
    document.getElementById('loadJsonInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (Array.isArray(data)) {
                    tbody.innerHTML = ''; 
                    data.forEach(item => addRow(item, true));
                    saveToLocalStorage();
                } else alert("Invalid JSON format.");
            } catch (err) {
                alert("Error importing document.");
            }
        };
        e.target.value = ''; 
        reader.readAsText(file);
    });
</script>
</body>
</html>
